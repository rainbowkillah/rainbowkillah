name: Update Currently Building Strip

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write

jobs:
  update-strip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update README strip
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bash .github/scripts/update-currently-building.sh

      - name: Commit changes
        run: |
          if git diff --quiet README.md; then
            echo "No README changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(readme): refresh currently building strip"
          git push || { echo "Failed to push changes. Check branch protection rules." >&2; exit 1; }
